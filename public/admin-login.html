<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador - CBflow tech</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-black text-zinc-100 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl p-8 w-full max-w-sm">
        <h1 class="text-xl font-black text-white mb-1 text-center">CBFLOW <span class="text-cyan-400">CONTROL</span></h1>
        <p class="text-xs text-zinc-500 mb-6 text-center">Acceso restringido al personal autorizado</p>

        <form id="form-login" class="space-y-3">
            <input type="text" id="login-usuario" placeholder="Usuario" autocomplete="username"
                class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white text-sm focus:border-cyan-500 outline-none" required>
            <input type="password" id="login-clave" placeholder="Contraseña" autocomplete="current-password"
                class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white text-sm focus:border-cyan-500 outline-none" required>

            <p id="login-error" class="text-red-400 text-xs hidden"></p>

            <button type="submit" id="btn-login"
                class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold p-3 rounded-xl transition cursor-pointer">
                Ingresar
            </button>
        </form>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errorBox = document.getElementById('login-error');
            errorBox.classList.add('hidden');
            btn.disabled = true;
            btn.innerText = 'Verificando...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuario: document.getElementById('login-usuario').value.trim(),
                        contrasena: document.getElementById('login-clave').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    window.location.href = data.rutaPanel || '/';
                } else {
                    errorBox.innerText = data.error || 'No se pudo iniciar sesión.';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.innerText = 'Error de conexión con el servidor.';
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Ingresar';
            }
        });
    </script>
</body>
</html>
